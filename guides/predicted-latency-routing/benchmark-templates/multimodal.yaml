# ---------------------------------------------------------------------------
# inference-perf workload template for the predicted-latency multimodal case.
#
# Same workload shape as the multimodal-serving aggregation benchmark: each
# request carries 3 × 720p images plus ~1.3K text tokens (100-token shared
# system prompt + 1200-token question), 300-token completion, organized into
# 600 prefix groups of 5 prompts sharing byte-identical text + images.
#
# Render with `envsubst < multimodal.yaml > config.yaml` AFTER exporting:
#   NAMESPACE      namespace where the stack is deployed
#   IP             EPP service ClusterIP (base_url = http://${IP})
#   BENCHMARK_PVC  PVC name where benchmark results are stored
#
# The ladder runs twice back-to-back for a fair predicted-latency measurement:
# the first run trains the predictor (an EPP restart resets it), the second is
# the measured run. See the Benchmarking Report note on cold starts.
# ---------------------------------------------------------------------------
endpoint:
  stack_name: &stack_name predicted-latency-Qwen3-VL-32B-Instruct  # user defined name for the stack (results prefix)
  model: &model Qwen/Qwen3-VL-32B-Instruct        # Exact HuggingFace model name. Must match stack deployed.
  namespace: &namespace ${NAMESPACE}  # Namespace where stack is deployed
  base_url: &url http://${IP}  # Base URL of inference endpoint
  hf_token_secret: llm-d-hf-token     # The name of secret that contains the HF token of the stack

control:
  work_dir: $HOME/llm-d-bench-work  # working directory to store temporary and autogenerated files.
  kubectl: kubectl                  # kubectl command: kubectl or oc

harness:
  name: &harness_name inference-perf
  results_pvc: ${BENCHMARK_PVC}   # PVC where benchmark results are stored
  namespace: *namespace           # Namespace where harness is deployed. Typically with stack.
  parallelism: 1
  wait_timeout: 6000
  image: ghcr.io/llm-d/llm-d-benchmark:v0.7.0

env:
  - name: RAYON_NUM_THREADS
    value: "4"

workload:
  Multimodal_Shared_Prefix:
    load:
      type: constant
      interval: 60.0
      stages:
        # Warmup — seats the prefix groups and trains the latency predictor
        - rate: 5
          duration: 600
        # Main ladder
        - rate: 5
          duration: 100
        - rate: 10
          duration: 100
        - rate: 15
          duration: 100
        - rate: 20
          duration: 100
        - rate: 25
          duration: 100
        - rate: 30
          duration: 100
        - rate: 35
          duration: 100
        - rate: 40
          duration: 100
      request_timeout: 300
    api:
      type: chat
      streaming: true
    server:
      type: vllm
      model_name: *model
      base_url: *url
      ignore_eos: true
    data:
      type: shared_prefix
      shared_prefix:
        multimodal:
          image:
            count: { type: fixed, min: 3, max: 3, mean: 3 }
            insertion_point: 0.0
            resolutions:
              - resolution: "720p"
                weight: 1
        num_groups: 600
        num_prompts_per_group: 5
        system_prompt_len: 100
        question_len: 1200
        output_len: 300
        enable_multi_turn_chat: false
    report:
      request_lifecycle:
        summary: true
        per_stage: true
        per_request: true
    storage:
      local_storage:
        path: /workspace
